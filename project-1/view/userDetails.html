<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r  min-h-screen flex items-center justify-center">

  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-lg border-2 border-gray-300 transform transition  duration-400  hover:scale-105">
    
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">
      File Share
    </h1>

    <form class="space-y-5">

      <div>
        <label class="block text-gray-600 mb-1">Full Name</label>
        <input 
          type="text" 
          placeholder="Enter your full name"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <div>
        <label class="block text-gray-600 mb-1">Phone Number</label>
        <input 
          type="number" 
          placeholder="Enter your phonenumber"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </div>
      <div>
        <label class="block text-gray-600 mb-1">Email</label>
        <input 
          type="email" 
          placeholder="Enter your email"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </div>
      <div>
        <label class="block text-gray-600 mb-1">Password</label>
        <input 
          type="password" 
          placeholder="Enter your password"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
      </div>

      <button 
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-200">
        Login
      </button>

    </form>

    <div class="text-center mt-6">
      <p class="text-gray-600 text-sm">
        Don't have an account?
      </p>
      <button 
        class="mt-2 text-green-400 font-semibold hover:underline">
        Sign Up
      </button>
    </div>

  </div>

</body>
</html>
