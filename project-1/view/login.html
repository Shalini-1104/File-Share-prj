<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Share Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center mt-10 bg-gradient-to-r bg-blue-200" >

  <div class="bg-white border-2 border-gray-300 w-full max-w-lg p-10 rounded-2xl shadow-xl transform transition duration-400 hover:scale-105"> 

    <h1 class="text-purple-500 font-bold text-4xl text-center mb-7">File Share</h1>

    <form class="space-y-6">
      


      
      <div>
        <label class="block text-gray-700 mb-1">Email</label>
        <input type="email" placeholder="Enter your email" 
          class="w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>

     
      
      <div>
        <label class="block text-gray-700 mb-1">Password</label>
        <input type="password" placeholder="Enter your password" 
          class="w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>

    </form>
      
    <div class="mt-5 flex items-center flex-col gap-3">
      <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-200">Login</button>
      <button class="font-semibold text-blue-600 hover:underline">Sign up</button>
    </div>
    
  </div>

</body>
</html>
